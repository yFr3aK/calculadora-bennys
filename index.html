<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Mecânica</title>

<style>
body {
  background: #0a0a0a;
  font-family: Arial;
  color: white;
  margin: 0;
}

h1 {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.categoria {
  margin-top: 30px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

.categoria h2 {
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items: center;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

button {
  background: #007bff;
  border: none;
  padding: 5px 10px;
  color: white;
  cursor: pointer;
}

.total {
  text-align: center;
  font-size: 28px;
  margin: 30px 0;
}
</style>
</head>

<body>

<h1>TABELA DA MECÂNICA</h1>

<div class="container" id="app"></div>

<div class="total">
TOTAL: R$ <span id="total">0</span>
</div>

<script>
const categorias = {
  "Full Tuning": [
    {nome:"Sem Blindagem", preco:150000},
    {nome:"Com Blindagem", preco:200000}
  ],
  "Estética": [
    {nome:"Pintura", preco:10000},
    {nome:"Neon", preco:15000},
    {nome:"Capô", preco:10000},
    {nome:"Grelha", preco:10000},
    {nome:"Aerofólio", preco:10000},
    {nome:"Parachoque Dianteiro", preco:10000},
    {nome:"Parachoque Traseiro", preco:10000},
    {nome:"Saia", preco:10000},
    {nome:"Vidro", preco:10000},
    {nome:"Placa", preco:10000},
    {nome:"Paralama", preco:10000}
  ],
  "Performance": [
    {nome:"Motor", preco:20000},
    {nome:"Freios", preco:20000},
    {nome:"Transmissão", preco:20000},
    {nome:"Turbo", preco:50000},
    {nome:"Blindagem", preco:50000}
  ],
  "Reparos": [
    {nome:"Kit Reparos", preco:10000},
    {nome:"Pneus", preco:1200}
  ]
};

let total = 0;

function atualizarTotal(){
  document.getElementById("total").innerText = total.toLocaleString();
}

const app = document.getElementById("app");

for (let categoria in categorias) {
  const divCat = document.createElement("div");
  divCat.className = "categoria";

  const titulo = document.createElement("h2");
  titulo.innerText = categoria;

  divCat.appendChild(titulo);

  categorias[categoria].forEach(item => {
    let qtd = 0;

    const div = document.createElement("div");
    div.className = "item";

    const nome = document.createElement("span");
    nome.innerText = item.nome;

    const controls = document.createElement("div");
    controls.className = "controls";

    const menos = document.createElement("button");
    menos.innerText = "-";

    const num = document.createElement("span");
    num.innerText = "0";

    const mais = document.createElement("button");
    mais.innerText = "+";

    menos.onclick = () => {
      if(qtd > 0){
        qtd--;
        total -= item.preco;
        num.innerText = qtd;
        atualizarTotal();
      }
    };

    mais.onclick = () => {
      qtd++;
      total += item.preco;
      num.innerText = qtd;
      atualizarTotal();
    };

    controls.appendChild(menos);
    controls.appendChild(num);
    controls.appendChild(mais);

    div.appendChild(nome);
    div.appendChild(controls);

    divCat.appendChild(div);
  });

  app.appendChild(divCat);
}
</script>

</body>
</html>
